<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆胶囊 - 系统设置</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6; color: #fff;
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at 25% 25%, rgba(233,30,99,.1) 0%, transparent 50%),
                              radial-gradient(circle at 75% 75%, rgba(156,39,176,.1) 0%, transparent 50%);
            min-height: 100vh;
        }
        .container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px; background: linear-gradient(135deg, #1a0a1e, #2d1b36);
            border-right: 1px solid rgba(233,30,99,.3); padding: 20px;
            position: relative;
        }
        .sidebar::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, #e91e63, #9c27b0);
        }
        .sidebar-brand { font-size: 1.5rem; font-weight: bold; text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px rgba(233,30,99,.7); }
        .sidebar-nav { list-style: none; }
        .nav-item { margin-bottom: 8px; }
        .nav-link {
            display: block; padding: 10px 12px; color: #b3b3b3; text-decoration: none;
            border-radius: 6px; transition: all .3s;
        }
        .nav-link:hover { color: #fff; background: rgba(233,30,99,.2); transform: translateX(4px); }
        .nav-link.active { color: #fff; background: rgba(233,30,99,.3); box-shadow: 0 0 8px rgba(233,30,99,.4); }
        .main-content { flex: 1; padding: 24px; overflow-y: auto; }
        .card {
            background: linear-gradient(135deg, rgba(26,10,30,.8), rgba(45,27,54,.8));
            border-radius: 10px; border: 1px solid rgba(233,30,99,.3);
            box-shadow: 0 4px 12px rgba(233,30,99,.15); margin-bottom: 24px;
            backdrop-filter: blur(8px);
        }
        .card-header {
            padding: 16px 20px; border-bottom: 1px solid rgba(233,30,99,.3);
            background: linear-gradient(90deg, rgba(233,30,99,.08), rgba(156,39,176,.08));
        }
        .card-title { font-size: 1.2rem; font-weight: bold; }
        .card-body { padding: 20px; }
        .section-title {
            font-size: .9rem; color: #e91e63; font-weight: 600;
            margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(233,30,99,.2);
        }
        .section-title:first-child { margin-top: 0; }
        .cfg-item { margin-bottom: 16px; }
        .cfg-row { display: flex; align-items: center; gap: 12px; }
        .cfg-label {
            min-width: 150px; font-weight: 500; color: #ccc; font-size: .9rem;
        }
        .cfg-hint {
            font-size: .75rem; color: #777; margin-top: 4px; margin-left: 162px;
        }
        .form-control {
            padding: 8px 10px; background: rgba(255,255,255,.08);
            border: 1px solid rgba(233,30,99,.25); border-radius: 5px;
            color: #fff; font-size: .9rem;
        }
        .form-control:focus { outline: none; border-color: #e91e63; box-shadow: 0 0 8px rgba(233,30,99,.25); }
        select.form-control { appearance: auto; }
        .toggle-switch {
            position: relative; width: 44px; height: 22px; flex-shrink: 0;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #444; border-radius: 22px; cursor: pointer; transition: .3s;
        }
        .toggle-slider::before {
            content: ''; position: absolute; width: 18px; height: 18px;
            left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: .3s;
        }
        .toggle-switch input:checked + .toggle-slider { background: #e91e63; }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(22px); }
        .btn {
            display: inline-block; padding: 8px 18px; border: none; border-radius: 5px;
            cursor: pointer; font-size: .9rem; transition: all .3s;
        }
        .btn-primary { background: #e91e63; color: #fff; }
        .btn-primary:hover { background: #c2185b; box-shadow: 0 0 10px rgba(233,30,99,.4); }
        .btn-outline { background: transparent; color: #e91e63; border: 1px solid #e91e63; }
        .btn-outline:hover { background: #e91e63; color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: .8rem; }
        .backup-list { list-style: none; }
        .backup-item {
            padding: 12px; border-bottom: 1px solid rgba(233,30,99,.15);
            display: flex; justify-content: space-between; align-items: center;
        }
        .backup-item:hover { background: rgba(233,30,99,.06); }
        .backup-time { font-size: .8rem; color: #999; }
        .backup-size { font-size: .75rem; color: #777; }
        .status-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: .75rem; font-weight: 600;
        }
        .status-on { background: rgba(76,175,80,.2); color: #4caf50; }
        .status-off { background: rgba(244,67,54,.2); color: #f44336; }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgba(233,30,99,.3); }
            .sidebar-nav { display: flex; overflow-x: auto; gap: 8px; }
            .nav-item { margin-bottom: 0; }
            .cfg-row { flex-direction: column; align-items: flex-start; }
            .cfg-label { min-width: auto; }
            .cfg-hint { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-brand">记忆胶囊</div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a class="nav-link" href="/">仪表盘</a></li>
                <li class="nav-item"><a class="nav-link" href="/relationships">关系图谱</a></li>
                <li class="nav-item"><a class="nav-link" href="/memories">记忆宫殿</a></li>
                <li class="nav-item"><a class="nav-link active" href="/settings">系统设置</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <div class="card">
                <div class="card-header"><h2 class="card-title">插件配置</h2></div>
                <div class="card-body">
                    <div id="config-form"></div>
                    <div style="margin-top:20px;">
                        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                        <span style="margin-left:12px;font-size:.8rem;color:#888;">部分设置需重启插件生效</span>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h2 class="card-title">认证状态</h2></div>
                <div class="card-body" id="auth-status"></div>
            </div>
            <div class="card">
                <div class="card-header"><h2 class="card-title">备份管理</h2></div>
                <div class="card-body">
                    <button class="btn btn-primary btn-sm" onclick="createBackup()">创建备份</button>
                    <ul class="backup-list" id="backup-list"></ul>
                </div>
            </div>
        </main>
    </div>
    <script>
        const GROUPS = {
    '记忆功能': ['memory_palace', 'auto_inject_enabled', 'dream_mode_enabled', 'conversation_logging_enabled', 'conversation_log_retention_days', 'identity_mapping_enabled', 'auto_fact_extraction_enabled'],
    '每日总结': ['daily_summary_injection_enabled', 'daily_summary_retention_days', 'daily_global_digest_enabled', 'daily_summary_group_whitelist', 'auto_summary_enabled', 'auto_summary_interval_hours'],
    '记忆注入': ['working_memory_limit', 'working_memory_max_chars', 'context_inject_position', 'relation_injection_refresh_time'],
    '搜索与排序': ['search_max_results', 'rrf_k', 'mmr_enabled', 'mmr_lambda', 'max_extracted_tags', 'tfidf_search_enabled', 'tfidf_search_limit'],
    'RAG混合记忆': ['memory_decay_enabled', 'memory_decay_base_stability', 'auto_merge_similar_enabled', 'similarity_threshold', 'cross_group_association_enabled'],
    '内存与缓存': ['lightweight_mode', 'disable_pypinyin', 'cache_ttl', 'max_cache_size'],
    '数据管理': ['memory_cleanup_enabled', 'memory_cleanup_days', 'memory_cleanup_max', 'backup_interval', 'backup_max_count'],
    '网络与分类': ['webui_host', 'webui_port', 'category_model', 'memory_categories', 'max_aliases_per_user']
};

        let currentSettings = {};

        async function loadSettings() {
            try {
                const resp = await fetch('/api/settings');
                const data = await resp.json();
                currentSettings = {};
                const form = document.getElementById('config-form');
                form.innerHTML = '';

                for (const [groupName, keys] of Object.entries(GROUPS)) {
                    const section = document.createElement('div');
                    section.innerHTML = `<div class="section-title">${groupName}</div>`;
                    let hasItems = false;

                    for (const key of keys) {
                        const item = data[key];
                        if (!item) continue;
                        hasItems = true;
                        currentSettings[key] = item.value;

                        const wrapper = document.createElement('div');
                        wrapper.className = 'cfg-item';

                        const row = document.createElement('div');
                        row.className = 'cfg-row';

                        if (item.type === 'bool') {
                            row.innerHTML = `
                                <span class="cfg-label">${item.display_name}</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="cfg_${key}" ${item.value ? 'checked' : ''}>
                                    <span class="toggle-slider"></span>
                                </label>
                            `;
                        } else if (item.options) {
                            let opts = item.options.map(o => `<option value="${o}" ${item.value === o ? 'selected' : ''}>${o}</option>`).join('');
                            row.innerHTML = `
                                <span class="cfg-label">${item.display_name}</span>
                                <select class="form-control" id="cfg_${key}" style="max-width:300px;">${opts}</select>
                            `;
                        } else if (item.type === 'int' || item.type === 'float') {
                            row.innerHTML = `
                                <span class="cfg-label">${item.display_name}</span>
                                <input type="number" class="form-control" id="cfg_${key}" value="${item.value}" step="${item.type === 'float' ? '0.1' : '1'}" style="max-width:140px;">
                            `;
                        } else if (item.type === 'list') {
                            row.innerHTML = `
                                <span class="cfg-label">${item.display_name}</span>
                                <input type="text" class="form-control" id="cfg_${key}" value="${Array.isArray(item.value) ? item.value.join(', ') : (item.value || '')}" style="max-width:400px;" placeholder="逗号分隔">
                            `;
                        } else {
                            row.innerHTML = `
                                <span class="cfg-label">${item.display_name}</span>
                                <input type="text" class="form-control" id="cfg_${key}" value="${item.value || ''}" style="max-width:400px;">
                            `;
                        }
                        wrapper.appendChild(row);

                        if (item.hint) {
                            const hint = document.createElement('div');
                            hint.className = 'cfg-hint';
                            hint.textContent = item.hint;
                            wrapper.appendChild(hint);
                        }

                        section.appendChild(wrapper);
                    }

                    if (hasItems) form.appendChild(section);
                }

                if (data.auth_status) {
                    const as = data.auth_status;
                    document.getElementById('auth-status').innerHTML = `
                        <div style="display:flex;gap:16px;align-items:center;">
                            <span>认证: <span class="status-badge ${as.enabled ? 'status-on' : 'status-off'}">${as.enabled ? '已启用' : '未启用'}</span></span>
                            <span>Token: <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:3px;font-size:.8rem;">${as.token_preview || '***'}</code></span>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('加载设置失败:', e);
            }
        }

        async function saveSettings() {
            const data = {};
            for (const key of Object.keys(currentSettings)) {
                const el = document.getElementById('cfg_' + key);
                if (!el) continue;
                if (el.type === 'checkbox') {
                    data[key] = el.checked;
                } else if (el.type === 'number') {
                    data[key] = parseFloat(el.value);
                } else {
                    data[key] = el.value;
                }
            }
            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await resp.json();
                alert(result.result);
            } catch (e) {
                console.error('保存失败:', e);
                alert('保存失败');
            }
        }

        async function createBackup() {
            try {
                const resp = await fetch('/api/backup');
                const result = await resp.json();
                alert(result.result);
                loadBackups();
            } catch (e) { alert('创建备份失败'); }
        }

        async function loadBackups() {
            try {
                const resp = await fetch('/api/backups');
                const backups = await resp.json();
                const list = document.getElementById('backup-list');
                list.innerHTML = '';
                if (!backups.length) { list.innerHTML = '<li class="backup-item" style="color:#888;">暂无备份</li>'; return; }
                backups.forEach(b => {
                    const li = document.createElement('li');
                    li.className = 'backup-item';
                    li.innerHTML = `
                        <div><div class="backup-time">${b.time || ''}</div><div class="backup-size">${b.size || ''}</div></div>
                        <div style="display:flex;gap:6px;">
                            <button class="btn btn-outline btn-sm" onclick="restoreBackup('${b.filename}')">恢复</button>
                            <button class="btn btn-outline btn-sm" onclick="deleteBackup('${b.filename}')">删除</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (e) { console.error('加载备份失败:', e); }
        }

        async function restoreBackup(fn) {
            if (!confirm('确定恢复？将覆盖当前数据。')) return;
            try {
                const resp = await fetch('/api/restore', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({filename: fn}) });
                alert((await resp.json()).result);
            } catch (e) { alert('恢复失败'); }
        }

        async function deleteBackup(fn) {
            if (!confirm('确定删除？')) return;
            try {
                const resp = await fetch('/api/backup/' + fn, { method: 'DELETE' });
                alert((await resp.json()).result);
                loadBackups();
            } catch (e) { alert('删除失败'); }
        }

        window.onload = function() { loadSettings(); loadBackups(); };
    </script>
</body>
</html>
