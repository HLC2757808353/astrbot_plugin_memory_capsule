<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境记忆 - 待开发</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            color: #e0e0e0;
        }
        .container { text-align: center; padding: 60px 40px; }
        .icon { font-size: 80px; margin-bottom: 30px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        h1 { font-size: 36px; margin-bottom: 16px; color: #e2b0ff; }
        p { font-size: 18px; color: #888; margin-bottom: 8px; }
        .badge { display: inline-block; margin-top: 20px; padding: 8px 24px; border-radius: 20px;
                 background: rgba(226,176,255,0.15); border: 1px solid rgba(226,176,255,0.3);
                 color: #e2b0ff; font-size: 14px; }
        .back-link { display: inline-block; margin-top: 30px; color: #6b7db3; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #a0b4e0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌙</div>
        <h1>梦境记忆</h1>
        <p>此功能正在开发中，敬请期待。</p>
        <p>届时将支持 AI 对每日记忆进行回顾与深度整合。</p>
        <span class="badge">🚧 待开发</span>
        <br>
        <a href="/" class="back-link">← 返回仪表盘</a>
    </div>
</body>
</html>
