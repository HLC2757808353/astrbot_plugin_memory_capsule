<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 记忆胶囊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .logo .version {
            color: #999;
            font-size: 14px;
        }

        .logo .emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-info {
            background-color: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }

        .alert-error {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: #999;
            font-size: 13px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hint-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .hint-box strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="emoji">🧠</div>
            <h1>记忆胶囊</h1>
            <div class="version">{{ version }}</div>
        </div>

        <div class="alert alert-info" style="display: block;">
            🔑 请输入插件启动时日志中显示的 <strong>Login Token</strong>
        </div>

        <div id="errorAlert" class="alert alert-error"></div>
        <div id="successAlert" class="alert alert-info"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="token">🔐 Login Token</label>
                <input 
                    type="text" 
                    id="password" 
                    placeholder="请输入Token（如：a8f3x9k2m）"
                    autocomplete="off"
                    required
                    autofocus
                >
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                登 录
            </button>
        </form>

        <div class="hint-box">
            <strong>💡 如何获取Token？</strong><br><br>
            Token仅在<strong>插件启动时</strong>打印一次到日志中。<br><br>
            📋 查看方式：<br>
            &nbsp;&nbsp;1. 打开 AstrBot 控制台/日志<br>
            &nbsp;&nbsp;2. 找到 "🔐 WebUI 认证信息" 区块<br>
            &nbsp;&nbsp;3. 复制 "登录Token" 后面的8位字符<br><br>
            ⚠️ 如果忘记Token，只需<strong>重启插件</strong>即可生成新Token
        </div>

        <div class="footer">
            <p>记忆胶囊 - 为 AI 赋予持久记忆</p>
            <p style="margin-top: 8px;">
                <a href="#" onclick="regenerateToken()">忘记Token？点击重新生成</a>
            </p>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const token = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            
            // 隐藏之前的提示
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            // 显示加载状态
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span>验证中...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password: token })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successAlert.textContent = '✅ ' + data.message + '，正在跳转...';
                    successAlert.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 800);
                } else {
                    errorAlert.textContent = '❌ ' + (data.message || 'Token错误，请检查输入');
                    errorAlert.style.display = 'block';
                    
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '登 录';
                    
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                errorAlert.textContent = '❌ 网络错误，请稍后重试';
                errorAlert.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '登 录';
            }
        }
        
        async function regenerateToken() {
            if (!confirm('⚠️ 确定要重新生成Token吗？\n\n这将使当前Token失效，新Token会显示在日志中。\n\n（需要能访问服务器日志）')) {
                return;
            }
            
            try {
                const response = await fetch('/api/auth/reset', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ 新Token已生成！\n\n请查看 AstrBot 日志获取新的Token。\n格式：' + (data.token_prefix || '****'));
                } else {
                    alert('❌ 重置失败：' + (data.message || '未知错误'));
                }
            } catch (error) {
                alert('❌ 网络错误：' + error.message);
            }
        }
        
        // 回车键提交
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
